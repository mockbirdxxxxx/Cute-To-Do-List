<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Cute To-Do List ✨</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 My To-Do List 🌸</h1>
            <p class="subtitle">Let's get things done! ✨</p>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task... 📝"
                class="task-input"
            >
            <button id="addBtn" class="add-btn">
                <span>Add</span>
                <span class="plus-icon">+</span>
            </button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here -->
        </ul>

        <div class="empty-state">
            <p class="empty-emoji">🎉</p>
            <p>No tasks yet! Add one to get started! 🚀</p>
        </div>

        <div class="stats">
            <p><span id="totalTasks">0</span> total • <span id="completedTasks">0</span> done</p>
        </div>

        <button id="clearBtn" class="clear-btn">Clear Completed ✨</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
